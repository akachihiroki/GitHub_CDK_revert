name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  test-and-synth:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: CDK Synth
        run: npx cdk synth

  revert-on-failure:
    needs: test-and-synth
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/master' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Revert failed commit
        env:
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PARENTS=$(git rev-list --parents -n 1 "$SHA")
          COUNT=$(echo "$PARENTS" | awk '{print NF-1}')

          if [ "$COUNT" -gt 1 ]; then
            git revert --no-edit -m 1 "$SHA"
          else
            git revert --no-edit "$SHA"
          fi

          git push
